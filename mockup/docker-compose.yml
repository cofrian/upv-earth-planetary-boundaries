services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-upvearth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upvearth}
      POSTGRES_DB: ${POSTGRES_DB:-upvearth}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upvearth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ..
      dockerfile: mockup/backend/Dockerfile
    gpus: all
    env_file:
      - .env
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-upvearth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upvearth}
      POSTGRES_DB: ${POSTGRES_DB:-upvearth}
      UPLOAD_DIR: /app/data/uploads
      PB_REFERENCE_CSV: /app/corpus_PB/data/pb_reference.csv
      CORS_ORIGINS: '["*"]'
      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL_NAME: qwen2.5:14b
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ../data/corpus:/app/data/corpus:ro
      - ./data/uploads:/app/data/uploads
      - ./data/seed:/app/data/seed
      - ../corpus_PB:/app/corpus_PB:ro

  frontend:
    build:
      context: ..
      dockerfile: mockup/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  ollama_data:
